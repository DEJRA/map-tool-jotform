<!DOCTYPE html>
<html>
<head>
  <title>Map Tool Test</title>
  <style>
    #map { height: 500px; width: 100%; }
    body { font-family: sans-serif; padding: 10px; }
    button { margin-left: 10px; }
  </style>
</head>
<body>
  <h2>Enter an address:</h2>
  <input id="addressInput" type="text" placeholder="123 Main St, City, State" style="width: 300px;">
  <button onclick="geocodeAddress()">Go</button>
  <button onclick="clearPolygon()">Clear Shape</button>
  <p>After locating your address, click points on the map to draw a shape. Click "Clear Shape" to start over.</p>
  <div id="map"></div>

  <script>
    let map, geocoder, currentPolygon, polygonPoints = [];

    function initMap() {
      geocoder = new google.maps.Geocoder();
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 39.8283, lng: -98.5795 },
        zoom: 4,
      });

      // Every click on the map adds a point to the current shape
      map.addListener("click", (event) => {
        polygonPoints.push(event.latLng);
        drawPolygon();
      });
    }

    function drawPolygon() {
      if (currentPolygon) {
        currentPolygon.setMap(null);
      }
      currentPolygon = new google.maps.Polygon({
        paths: polygonPoints,
        fillColor: "#FF0000",
        fillOpacity: 0.4,
        strokeWeight: 2,
        editable: true,
      });
      currentPolygon.setMap(map);
    }

    function clearPolygon() {
      if (currentPolygon) {
        currentPolygon.setMap(null);
      }
      polygonPoints = [];
      currentPolygon = null;
    }

    function geocodeAddress() {
      const address = document.getElementById("addressInput").value;
      geocoder.geocode({ address: address }, (results, status) => {
        if (status === "OK") {
          map.setCenter(results[0].geometry.location);
          map.setZoom(15);
        } else {
          alert("Address not found: " + status);
        }
      });
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcyAvzOdRiSogOehJRXOkYEyisWhHoaIQ&callback=initMap" async></script>
</body>
</html>
