<!DOCTYPE html>
<html>
<head>
  <title>Map Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 10px;
      width: 100%;
      max-width: 590px;
      color: #2d2d2d;
      font-size: 13px;
    }
    h2 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    p { font-size: 12px; color: #555; margin-bottom: 6px; }
    #map {
      height: 340px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ddd;
      margin: 8px 0;
    }
    .controls { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    input[type="text"] {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      flex: 1;
      min-width: 0;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background-color 0.15s ease;
    }
    .btn-primary { background-color: #2563eb; color: white; }
    .btn-primary:hover { background-color: #1d4ed8; }
    .btn-secondary { background-color: #f1f1f1; color: #333; }
    .btn-secondary:hover { background-color: #e2e2e2; }
    .btn-success { background-color: #16a34a; color: white; }
    .btn-success:hover { background-color: #15803d; }
    #resultImage {
      margin-top: 10px;
      max-width: 100%;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    #imageContainer h3 { font-size: 14px; font-weight: 700; margin: 12px 0 6px; }
    .copy-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    .copy-row p { margin: 0; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <h2>Step 1: Enter your address</h2>
  <div class="controls">
    <input id="addressInput" type="text" placeholder="123 Main St, City, State">
    <button class="btn-primary" onclick="geocodeAddress()">Go</button>
  </div>

  <h2>Step 2: Click points on the map to draw your area</h2>
  <p>Click multiple points to outline the shape. Click "Clear Shape" to start over.</p>
  <div id="map"></div>
  <div class="controls">
    <button class="btn-secondary" onclick="clearPolygon()">Clear Shape</button>
    <button class="btn-success" onclick="generateImage()">Generate Image</button>
  </div>

  <div id="imageContainer"></div>

  <script>
    let map, geocoder, currentPolygon, polygonPoints = [];

    function initMap() {
      geocoder = new google.maps.Geocoder();
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 39.8283, lng: -98.5795 },
        zoom: 4,
      });
      map.addListener("click", (event) => {
        polygonPoints.push(event.latLng);
        drawPolygon();
      });
    }

    function drawPolygon() {
      if (currentPolygon) currentPolygon.setMap(null);
      currentPolygon = new google.maps.Polygon({
        paths: polygonPoints,
        fillColor: "#FF0000",
        fillOpacity: 0.4,
        strokeWeight: 2,
        editable: true,
      });
      currentPolygon.setMap(map);
    }

    function clearPolygon() {
      if (currentPolygon) currentPolygon.setMap(null);
      polygonPoints = [];
      currentPolygon = null;
      document.getElementById("imageContainer").innerHTML = "";
    }

    function geocodeAddress() {
      const address = document.getElementById("addressInput").value;
      geocoder.geocode({ address: address }, (results, status) => {
        if (status === "OK") {
          map.setCenter(results[0].geometry.location);
          map.setZoom(15);
        } else {
          alert("Address not found: " + status);
        }
      });
    }

    function buildGeoJSON() {
      const coords = polygonPoints.map(p => [p.lng(), p.lat()]);
      coords.push([polygonPoints[0].lng(), polygonPoints[0].lat()]);
      return {
        type: "Feature",
        geometry: { type: "Polygon", coordinates: [coords] }
      };
    }

    function buildPathStr() {
      let pathStr = "color:0xff0000ff|fillcolor:0xff000066";
      polygonPoints.forEach(p => { pathStr += `|${p.lat()},${p.lng()}`; });
      pathStr += `|${polygonPoints[0].lat()},${polygonPoints[0].lng()}`;
      return pathStr;
    }

    function copyUrl() {
      navigator.clipboard.writeText(document.getElementById("urlBox").value)
        .then(() => alert("Image link copied!"))
        .catch(() => alert("Couldn't copy automatically. Please try again."));
    }

    async function generateImage() {
      if (polygonPoints.length < 3) {
        alert("Please draw a shape with at least 3 points first.");
        return;
      }

      document.getElementById("imageContainer").innerHTML = `<p>Generating image, please wait...</p>`;

      try {
        const response = await fetch("/api/generate-map", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            path: buildPathStr(),
            geojson: buildGeoJSON()
          })
        });

        const result = await response.json();

        if (result.error) {
          document.getElementById("imageContainer").innerHTML = `<p>Something went wrong. Please try again.</p>`;
          return;
        }

        // The image URL contains the filename which serves as the attribution link
        // to the matching JSON record in GitHub — no extra field needed
        document.getElementById("imageContainer").innerHTML = `
          <h3>Step 3: Copy your image link</h3>
          <img id="resultImage" src="${result.imageUrl}">
          <div class="copy-row">
            <input id="urlBox" type="text" value="${result.imageUrl}" style="display:none;">
            <button class="btn-primary" onclick="copyUrl()">Copy Link</button>
            <p>Then paste it into the "Map Image Link" field on the form below.</p>
          </div>
        `;

      } catch (error) {
        document.getElementById("imageContainer").innerHTML = `<p>Something went wrong. Please try again.</p>`;
      }
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcyAvzOdRiSogOehJRXOkYEyisWhHoaIQ&callback=initMap" async></script>
</body>
</html>
