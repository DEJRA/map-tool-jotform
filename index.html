<!DOCTYPE html>
<html>
<head>
  <title>Map Tool Test</title>
  <style>
    #map { height: 500px; width: 100%; }
    body { font-family: sans-serif; padding: 10px; }
  </style>
</head>
<body>
  <h2>Enter an address:</h2>
  <input id="addressInput" type="text" placeholder="123 Main St, City, State" style="width: 300px;">
  <button onclick="geocodeAddress()">Go</button>
  <div id="map"></div>

  <script>
    let map, geocoder, drawingManager, currentPolygon;

    function initMap() {
      geocoder = new google.maps.Geocoder();
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 39.8283, lng: -98.5795 },
        zoom: 4,
      });

      drawingManager = new google.maps.drawing.DrawingManager({
        drawingMode: google.maps.drawing.OverlayType.POLYGON,
        drawingControl: true,
        drawingControlOptions: {
          position: google.maps.ControlPosition.TOP_CENTER,
          drawingModes: ["polygon"],
        },
        polygonOptions: {
          fillColor: "#FF0000",
          fillOpacity: 0.4,
          strokeWeight: 2,
          editable: true,
        },
      });
      drawingManager.setMap(map);

      // When a new shape is drawn, remove any old one so there's only ever one
      google.maps.event.addListener(drawingManager, "overlaycomplete", function (event) {
        if (currentPolygon) {
          currentPolygon.setMap(null);
        }
        currentPolygon = event.overlay;
      });
    }

    function geocodeAddress() {
      const address = document.getElementById("addressInput").value;
      geocoder.geocode({ address: address }, (results, status) => {
        if (status === "OK") {
          map.setCenter(results[0].geometry.location);
          map.setZoom(15);
        } else {
          alert("Address not found: " + status);
        }
      });
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcyAvzOdRiSogOehJRXOkYEyisWhHoaIQ&libraries=drawing&callback=initMap" async></script>
</body>
</html>
