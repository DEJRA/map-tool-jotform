<!DOCTYPE html>
<html>
<head>
  <title>Map Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 10px;
      width: 100%;
      max-width: 590px;
      color: #2d2d2d;
      font-size: 13px;
    }
    h2 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    p { font-size: 12px; color: #555; margin-bottom: 6px; }

    #mapContainer {
      position: relative;
      height: 340px;
      width: 100%;
      margin: 8px 0;
    }
    #map {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    #resultImage {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 100%;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #ddd;
      display: none;
    }
    #loadingOverlay {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 100%;
      background: rgba(255,255,255,0.75);
      border-radius: 6px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #555;
      font-style: italic;
    }

    .controls { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    input[type="text"] {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      flex: 1;
      min-width: 0;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background-color 0.15s ease;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background-color: #2563eb; color: white; }
    .btn-primary:hover:not(:disabled) { background-color: #1d4ed8; }
    .btn-secondary { background-color: #f1f1f1; color: #333; }
    .btn-secondary:hover:not(:disabled) { background-color: #e2e2e2; }
    .btn-success { background-color: #16a34a; color: white; }
    .btn-success:hover:not(:disabled) { background-color: #15803d; }

    #stepLabel { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    #stepHint { font-size: 12px; color: #555; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h2>Step 1: Enter your address</h2>
  <div class="controls">
    <input id="addressInput" type="text" placeholder="123 Main St, City, State">
    <button class="btn-primary" onclick="geocodeAddress()">Go</button>
  </div>

  <div id="stepLabel">Step 2: Click points on the map to draw your area</div>
  <div id="stepHint">Click multiple points to outline the shape. Click "Clear Shape" to start over.</div>

  <div id="mapContainer">
    <div id="map"></div>
    <img id="resultImage" src="" alt="Generated map">
    <div id="loadingOverlay">Submitting, please wait...</div>
  </div>

  <div class="controls" id="actionControls">
    <button class="btn-secondary" onclick="clearPolygon()">Clear Shape</button>
    <button class="btn-success"   id="generateBtn" onclick="generatePreview()">Generate Image</button>
    <button class="btn-primary"   id="submitBtn"   onclick="submitAndCopy()" style="display:none;">Submit &amp; Copy Link</button>
  </div>

  <script>
    const CLIENT_KEY = "AIzaSyAcyAvzOdRiSogOehJRXOkYEyisWhHoaIQ";
    let map, geocoder, currentPolygon, polygonPoints = [];
    let previewGenerated = false;

    function initMap() {
      geocoder = new google.maps.Geocoder();
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 39.8283, lng: -98.5795 },
        zoom: 4,
      });
      map.addListener("click", (event) => {
        if (previewGenerated) return;
        polygonPoints.push(event.latLng);
        drawPolygon();
      });
    }

    function drawPolygon() {
      if (currentPolygon) currentPolygon.setMap(null);
      currentPolygon = new google.maps.Polygon({
        paths: polygonPoints,
        fillColor: "#FF0000",
        fillOpacity: 0.4,
        strokeWeight: 2,
        editable: true,
      });
      currentPolygon.setMap(map);
    }

    function clearPolygon() {
      if (currentPolygon) currentPolygon.setMap(null);
      polygonPoints = [];
      currentPolygon = null;
      previewGenerated = false;

      document.getElementById("resultImage").style.display = "none";
      document.getElementById("resultImage").src = "";
      document.getElementById("map").style.display = "block";

      document.getElementById("generateBtn").style.display = "inline-block";
      document.getElementById("submitBtn").style.display = "none";

      document.getElementById("stepLabel").textContent = "Step 2: Click points on the map to draw your area";
      document.getElementById("stepHint").textContent = 'Click multiple points to outline the shape. Click "Clear Shape" to start over.';

      document.getElementById("addressInput").value = "";
      map.setCenter({ lat: 39.8283, lng: -98.5795 });
      map.setZoom(4);
    }

    function geocodeAddress() {
      const address = document.getElementById("addressInput").value;
      geocoder.geocode({ address: address }, (results, status) => {
        if (status === "OK") {
          map.setCenter(results[0].geometry.location);
          map.setZoom(15);
        } else {
          alert("Address not found: " + status);
        }
      });
    }

    function buildGeoJSON() {
      const coords = polygonPoints.map(p => [p.lng(), p.lat()]);
      coords.push([polygonPoints[0].lng(), polygonPoints[0].lat()]);
      return {
        type: "Feature",
        geometry: { type: "Polygon", coordinates: [coords] }
      };
    }

    function buildPathStr() {
      let pathStr = "color:0xff0000ff|fillcolor:0xff000066";
      polygonPoints.forEach(p => {
        pathStr += `|${p.lat().toFixed(4)},${p.lng().toFixed(4)}`;
      });
      pathStr += `|${polygonPoints[0].lat().toFixed(4)},${polygonPoints[0].lng().toFixed(4)}`;
      return pathStr;
    }

    // Step 2 → Step 3: build a preview image instantly on the frontend,
    // no backend call, nothing stored yet
    function generatePreview() {
      if (polygonPoints.length < 3) {
        alert("Please draw a shape with at least 3 points first.");
        return;
      }

      const path = buildPathStr();
      const previewUrl = `https://maps.googleapis.com/maps/api/staticmap?size=640x400&maptype=roadmap&path=${encodeURIComponent(path)}&key=${CLIENT_KEY}`;

      const img = document.getElementById("resultImage");
      img.src = previewUrl;
      img.style.display = "block";
      document.getElementById("map").style.display = "none";
      previewGenerated = true;

      document.getElementById("generateBtn").style.display = "none";
      document.getElementById("submitBtn").style.display = "inline-block";

      document.getElementById("stepLabel").textContent = "Step 3: Review and submit your area";
      document.getElementById("stepHint").textContent = 'Happy with your selection? Click "Submit & Copy Link" to save it and copy the link. Click "Clear Shape" to start over.';
    }

    // Step 3 → Done: two clearly separated phases
    async function submitAndCopy() {
      const btn = document.getElementById("submitBtn");
      const overlay = document.getElementById("loadingOverlay");

      // ── Phase 1: Submit to GitHub ──────────────────────────────────────────
      btn.disabled = true;
      btn.textContent = "Submitting...";
      overlay.style.display = "flex";

      let imageUrl;
      try {
        const response = await fetch("/api/generate-map", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            path: buildPathStr(),
            geojson: buildGeoJSON()
          })
        });

        const result = await response.json();

        if (result.error) {
          throw new Error(result.error);
        }

        imageUrl = result.imageUrl;

        // Swap preview for the permanent GitHub-hosted image
        document.getElementById("resultImage").src = imageUrl;

      } catch (error) {
        overlay.style.display = "none";
        btn.disabled = false;
        btn.textContent = "Submit & Copy Link";
        alert("Submission failed. Please try again.");
        return;
      }

      // Submission complete — hide overlay before clipboard step
      overlay.style.display = "none";
      document.getElementById("stepLabel").textContent = "Done!";

      // ── Phase 2: Copy link to clipboard ────────────────────────────────────
      btn.textContent = "Copying Link...";

      try {
        await navigator.clipboard.writeText(imageUrl);
        btn.textContent = "✓ Link Copied";
        document.getElementById("stepHint").textContent = 'Your link has been copied. Paste it into the "Map Image Link" field on the form below. Click "Clear Shape" to start over.';
      } catch (clipboardError) {
        // Clipboard blocked (e.g. inside a cross-origin iframe)
        btn.style.display = "none";
        document.getElementById("stepHint").innerHTML = 'Submission saved. Copy your link below and paste it into the "Map Image Link" field on the form.<br><br><input type="text" value="' + imageUrl + '" readonly style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:12px;margin-top:4px;" onclick="this.select();">';
      }
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcyAvzOdRiSogOehJRXOkYEyisWhHoaIQ&callback=initMap" async></script>
</body>
</html>
