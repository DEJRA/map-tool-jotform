<!DOCTYPE html>
<html>
<head>
  <title>Map Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 10px;
      width: 100%;
      max-width: 590px;
      color: #2d2d2d;
      font-size: 13px;
    }
    h2 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    p { font-size: 12px; color: #555; margin-bottom: 6px; }

    /* Map and result image share the same fixed-height container */
    #mapContainer {
      position: relative;
      height: 340px;
      width: 100%;
      margin: 8px 0;
    }
    #map {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    #resultImage {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 100%;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #ddd;
      display: none;
    }

    .controls { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    input[type="text"] {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      flex: 1;
      min-width: 0;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background-color 0.15s ease;
    }
    .btn-primary { background-color: #2563eb; color: white; }
    .btn-primary:hover { background-color: #1d4ed8; }
    .btn-secondary { background-color: #f1f1f1; color: #333; }
    .btn-secondary:hover { background-color: #e2e2e2; }
    .btn-success { background-color: #16a34a; color: white; }
    .btn-success:hover { background-color: #15803d; }

    #stepLabel { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    #stepHint { font-size: 12px; color: #555; margin-bottom: 6px; }

    /* Loading overlay on top of the map while generating */
    #loadingOverlay {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 100%;
      background: rgba(255,255,255,0.75);
      border-radius: 6px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #555;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h2>Step 1: Enter your address</h2>
  <div class="controls">
    <input id="addressInput" type="text" placeholder="123 Main St, City, State">
    <button class="btn-primary" onclick="geocodeAddress()">Go</button>
  </div>

  <div id="stepLabel">Step 2: Click points on the map to draw your area</div>
  <div id="stepHint">Click multiple points to outline the shape. Click "Clear Shape" to start over.</div>

  <div id="mapContainer">
    <div id="map"></div>
    <img id="resultImage" src="" alt="Generated map">
    <div id="loadingOverlay">Generating image, please wait...</div>
  </div>

  <div class="controls" id="actionControls">
    <button class="btn-secondary" id="clearBtn" onclick="clearPolygon()">Clear Shape</button>
    <button class="btn-success" id="generateBtn" onclick="generateImage()">Generate Image</button>
    <input id="urlBox" type="text" style="display:none;">
    <button class="btn-primary" id="copyBtn" style="display:none;" onclick="copyUrl()">Copy Link</button>
  </div>

  <script>
    let map, geocoder, currentPolygon, polygonPoints = [];
    let imageGenerated = false;

    function initMap() {
      geocoder = new google.maps.Geocoder();
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 39.8283, lng: -98.5795 },
        zoom: 4,
      });
      map.addListener("click", (event) => {
        if (imageGenerated) return;
        polygonPoints.push(event.latLng);
        drawPolygon();
      });
    }

    function drawPolygon() {
      if (currentPolygon) currentPolygon.setMap(null);
      currentPolygon = new google.maps.Polygon({
        paths: polygonPoints,
        fillColor: "#FF0000",
        fillOpacity: 0.4,
        strokeWeight: 2,
        editable: true,
      });
      currentPolygon.setMap(map);
    }

    function clearPolygon() {
      // Always reset everything back to a clean starting state
      if (currentPolygon) currentPolygon.setMap(null);
      polygonPoints = [];
      currentPolygon = null;
      imageGenerated = false;

      // Hide result image, show map
      document.getElementById("resultImage").style.display = "none";
      document.getElementById("map").style.display = "block";

      // Reset buttons
      document.getElementById("generateBtn").style.display = "inline-block";
      document.getElementById("copyBtn").style.display = "none";
      document.getElementById("urlBox").value = "";

      // Reset labels
      document.getElementById("stepLabel").textContent = "Step 2: Click points on the map to draw your area";
      document.getElementById("stepHint").textContent = 'Click multiple points to outline the shape. Click "Clear Shape" to start over.';

      // Reset address input and map view
      document.getElementById("addressInput").value = "";
      map.setCenter({ lat: 39.8283, lng: -98.5795 });
      map.setZoom(4);
    }

    function geocodeAddress() {
      const address = document.getElementById("addressInput").value;
      geocoder.geocode({ address: address }, (results, status) => {
        if (status === "OK") {
          map.setCenter(results[0].geometry.location);
          map.setZoom(15);
        } else {
          alert("Address not found: " + status);
        }
      });
    }

    function buildGeoJSON() {
      const coords = polygonPoints.map(p => [p.lng(), p.lat()]);
      coords.push([polygonPoints[0].lng(), polygonPoints[0].lat()]);
      return {
        type: "Feature",
        geometry: { type: "Polygon", coordinates: [coords] }
      };
    }

    function buildPathStr() {
      let pathStr = "color:0xff0000ff|fillcolor:0xff000066";
      polygonPoints.forEach(p => {
        pathStr += `|${p.lat().toFixed(4)},${p.lng().toFixed(4)}`;
      });
      pathStr += `|${polygonPoints[0].lat().toFixed(4)},${polygonPoints[0].lng().toFixed(4)}`;
      return pathStr;
    }

    function copyUrl() {
      navigator.clipboard.writeText(document.getElementById("urlBox").value)
        .then(() => alert("Image link copied!"))
        .catch(() => alert("Couldn't copy automatically. Please try again."));
    }

    async function generateImage() {
      if (polygonPoints.length < 3) {
        alert("Please draw a shape with at least 3 points first.");
        return;
      }

      // Show loading overlay over the map while generating
      const overlay = document.getElementById("loadingOverlay");
      overlay.style.display = "flex";
      document.getElementById("generateBtn").disabled = true;

      try {
        const response = await fetch("/api/generate-map", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            path: buildPathStr(),
            geojson: buildGeoJSON()
          })
        });

        const result = await response.json();
        overlay.style.display = "none";
        document.getElementById("generateBtn").disabled = false;

        if (result.error) {
          alert("Something went wrong. Please try again.");
          return;
        }

        // Replace map with generated image in the same container
        const img = document.getElementById("resultImage");
        img.src = result.imageUrl;
        img.style.display = "block";
        document.getElementById("map").style.display = "none";
        imageGenerated = true;

        // Swap Generate button for Copy Link button
        document.getElementById("generateBtn").style.display = "none";
        const urlBox = document.getElementById("urlBox");
        urlBox.value = result.imageUrl;
        document.getElementById("copyBtn").style.display = "inline-block";

        // Update step label
        document.getElementById("stepLabel").textContent = "Step 3: Copy your image link";
        document.getElementById("stepHint").textContent = 'Paste it into the "Map Image Link" field on the form below. Click "Clear Shape" to start over.';

      } catch (error) {
        overlay.style.display = "none";
        document.getElementById("generateBtn").disabled = false;
        alert("Something went wrong. Please try again.");
      }
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcyAvzOdRiSogOehJRXOkYEyisWhHoaIQ&callback=initMap" async></script>
</body>
</html>
