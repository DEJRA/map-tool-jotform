<!DOCTYPE html>
<html>
<head>
  <title>Map Tool Test</title>
  <style>
    #map { height: 500px; width: 100%; }
    body { font-family: sans-serif; padding: 10px; }
    button { margin-left: 10px; }
    #resultImage { margin-top: 20px; max-width: 100%; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h2>Enter an address:</h2>
  <input id="addressInput" type="text" placeholder="123 Main St, City, State" style="width: 300px;">
  <button onclick="geocodeAddress()">Go</button>
  <button onclick="clearPolygon()">Clear Shape</button>
  <p>After locating your address, click points on the map to draw a shape.</p>
  <div id="map"></div>
  <br>
  <button onclick="generateImage()">Generate Image</button>
  <div id="imageContainer"></div>

  <script>
    let map, geocoder, currentPolygon, polygonPoints = [];
    const API_KEY = "AIzaSyAcyAvzOdRiSogOehJRXOkYEyisWhHoaIQ";

    function initMap() {
      geocoder = new google.maps.Geocoder();
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 39.8283, lng: -98.5795 },
        zoom: 4,
      });

      map.addListener("click", (event) => {
        polygonPoints.push(event.latLng);
        drawPolygon();
      });
    }

    function drawPolygon() {
      if (currentPolygon) {
        currentPolygon.setMap(null);
      }
      currentPolygon = new google.maps.Polygon({
        paths: polygonPoints,
        fillColor: "#FF0000",
        fillOpacity: 0.4,
        strokeWeight: 2,
        editable: true,
      });
      currentPolygon.setMap(map);
    }

    function clearPolygon() {
      if (currentPolygon) {
        currentPolygon.setMap(null);
      }
      polygonPoints = [];
      currentPolygon = null;
      document.getElementById("imageContainer").innerHTML = "";
    }

    function geocodeAddress() {
      const address = document.getElementById("addressInput").value;
      geocoder.geocode({ address: address }, (results, status) => {
        if (status === "OK") {
          map.setCenter(results[0].geometry.location);
          map.setZoom(15);
        } else {
          alert("Address not found: " + status);
        }
      });
    }

    function generateImage() {
  if (polygonPoints.length < 3) {
    alert("Please draw a shape with at least 3 points first.");
    return;
  }

  let pathStr = "color:0xff0000ff|fillcolor:0xff000066";
  polygonPoints.forEach((point) => {
    pathStr += `|${point.lat()},${point.lng()}`;
  });
  const first = polygonPoints[0];
  pathStr += `|${first.lat()},${first.lng()}`;

  const url = `https://maps.googleapis.com/maps/api/staticmap?size=640x400&maptype=roadmap&path=${encodeURIComponent(pathStr)}&key=${API_KEY}`;

  document.getElementById("imageContainer").innerHTML = `<h3>Generated Image:</h3><img id="resultImage" src="${url}">`;

  // Send the image URL up to the parent page (JotForm)
  window.parent.postMessage({ type: "mapImageGenerated", imageUrl: url }, "*");
}
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcyAvzOdRiSogOehJRXOkYEyisWhHoaIQ&callback=initMap" async></script>
</body>
</html>
